<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Summary Component</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main>
        <section class="complete_box"> 
            <div class="first_box ">
                <h1 class="your_result">Your Result</h1>
                <div class="circle_inside">
                  <p class="number"><span>76</span></p>
                  <p class="number_two">of 100</p>
                </div>
                <div class="lower"> 
                    <p>Great</p>
                    <p class="lower_part">You scored than 65% of the people who have taken these tests.</p>
                </div>
            </div>
            
             <div class="second_box">
                <h2>Summary</h2>
                <div class="color_box">
                    <div class="reaction_box">
                        <img src="./assets/images/icon-reaction.svg" alt="">
                        <h3 class="reaction">Reaction</h3>
                        <p><strong>80</strong>/100</p>
                    </div>
                    <div class="memory_box">
                        <img src="./assets/images/icon-memory.svg" alt="">
                        <h3 class="memory">Memory</h3> 
                        <p><strong>92</strong>/100</p>
                    </div>
                    <div class="verbal_box">
                        <img src="./assets/images/icon-verbal.svg" alt="">
                        <h3 class="verbal">Verbal</h3>
                        <p><strong>61</strong>/100</p>
                    </div>
                    <div class="visual_box">
                        <img src="./assets/images/icon-visual.svg" alt="">
                        <h3 class="visual">Visual</h3>
                        <p><strong>72</strong>/100</p>
                    </div>
              </div>
              <button type="button" class="continue">Continue</button>
             </div>
        </section>
    </main>
</body>
</html>
